# This file configures the analyzer, which statically analyzes Dart code to
# check for errors, warnings, and lints.
#
# The issues identified by the analyzer are surfaced in the UI of Dart-enabled
# IDEs (https://dart.dev/tools#ides-and-editors). The analyzer can also be
# invoked from the command line by running `flutter analyze`.

# The following line activates a set of recommended lints for Flutter apps,
# packages, and plugins designed to encourage good coding practices.
include: package:flutter_lints/flutter.yaml

linter:
  # P3-50: Включены только «bug-finder» правила — они находят реальные баги
  # и не требуют массового рефакторинга (в отличие от style-правил вроде
  # prefer_single_quotes / avoid_print / prefer_const_constructors,
  # которые в этом проекте сгенерируют сотни предупреждений).
  # Style-правила планируется включить отдельным шагом после чистки кода.
  rules:
    # Поиск реальных багов:
    - cancel_subscriptions              # утечка StreamSubscription
    - close_sinks                       # утечка StreamController
    - hash_and_equals                   # переопределил ==, но не hashCode (или наоборот)
    - no_duplicate_case_values          # дубликаты в switch-case
    - valid_regexps                     # невалидные регулярки
    - use_rethrow_when_possible         # throw e вместо rethrow
    - avoid_returning_null_for_void     # return null в void-функции
    - avoid_void_async                  # async-функция без возврата Future
    - empty_catches                     # пустой catch блок
    - avoid_empty_else                  # пустой else
    - unnecessary_null_in_if_null_operators
    - prefer_void_to_null
    - no_adjacent_strings_in_list       # ['a' 'b'] вместо ['a', 'b']
    - throw_in_finally                  # throw внутри finally
    - control_flow_in_finally           # return/break/continue в finally
    - empty_statements                  # лишние ;
    - recursive_getters                 # геттер вызывает сам себя

# Additional information about this file can be found at
# https://dart.dev/guides/language/analysis-options

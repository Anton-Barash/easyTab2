name: easy_tab
description: "EasyTab - Excel Report Builder"
publish_to: 'none'
version: 1.0.15

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2
  cupertino_icons: ^1.0.8
  path_provider: ^2.1.2
  path: ^1.8.0
  image_picker: ^1.0.7
  provider: ^6.1.2
  shared_preferences: ^2.2.2
  file_picker: ^8.0.0+1
  excel_community: ^1.1.3
  archive: ^4.0.9
  share_plus: ^7.2.1
  open_file: ^3.3.2
  video_thumbnail: ^0.5.3
  video_player: ^2.8.2
  v_video_compressor: ^1.2.0
  image: ^4.2.0
  scrollable_positioned_list: ^0.3.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

dependency_overrides:
  xml: ^7.0.1

flutter:
  uses-material-design: true
  generate: true
